<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { activeMenu: 'affaires' };

  MENU_SRCS = {
    affaires:  'Affaires Vooroo.dc.html',
    prospects: 'Prospects Vooroo.dc.html',
    contacts:  'Contacts Vooroo.dc.html',
    produits:  'Produits Vooroo.dc.html',
    activites: 'Activités Vooroo.dc.html',
  };

  MENU_LABELS = {
    affaires:  'Affaires',
    prospects: 'Prospects',
    contacts:  'Contacts',
    produits:  'Produits',
    activites: 'Activités',
    devis:     'Devis & Factures',
    docs:      'Documents',
    stats:     'Statistiques',
    config:    'Guide de configuration',
    academy:   'Vooroo Academy',
    compte:    'Mon compte',
  };

  componentDidMount() {
    const frame = document.getElementById('crm-frame');
    if (frame) {
      frame.addEventListener('load', () => this._injectEmbedCSS());
    }
    this._navigate('affaires');
  }

  _navigate(menu) {
    this.setState({ activeMenu: menu });
    const frame = document.getElementById('crm-frame');
    const placeholder = document.getElementById('crm-placeholder');
    const label = document.getElementById('crm-placeholder-label');
    const src = this.MENU_SRCS[menu];
    if (frame && placeholder) {
      if (src) {
        frame.style.display = 'block';
        placeholder.style.display = 'none';
        if (frame.src !== src) frame.src = src;
      } else {
        frame.style.display = 'none';
        placeholder.style.display = 'flex';
        if (label) label.textContent = this.MENU_LABELS[menu] || menu;
      }
    }
  }

  _injectEmbedCSS() {
    const frame = document.getElementById('crm-frame');
    if (!frame) return;
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc || !doc.head) return;
      const old = doc.getElementById('embed-override');
      if (old) old.remove();
      const style = doc.createElement('style');
      style.id = 'embed-override';
      style.textContent = '#app-sidebar{display:none!important}#app-header{display:none!important}';
      doc.head.appendChild(style);
    } catch(e) {}
  }

  renderVals() {
    const s = this.state;
    const a = m => s.activeMenu === m;
    const nav = menu => () => this._navigate(menu);
    const ACT = 'rgba(255,255,255,.12)', LINE = '#16a34a', TR = 'transparent';
    return {
      activeMenuLabel: this.MENU_LABELS[s.activeMenu] || s.activeMenu,
      bgConfig:    a('config')?ACT:TR,    lineConfig:    a('config')?LINE:TR,
      bgStats:     a('stats')?ACT:TR,     lineStats:     a('stats')?LINE:TR,
      bgProspects: a('prospects')?ACT:TR, lineProspects: a('prospects')?LINE:TR,
      bgAffaires:  a('affaires')?ACT:TR,  lineAffaires:  a('affaires')?LINE:TR,
      bgActivites: a('activites')?ACT:TR, lineActivites: a('activites')?LINE:TR,
      bgContacts:  a('contacts')?ACT:TR,  lineContacts:  a('contacts')?LINE:TR,
      bgDevis:     a('devis')?ACT:TR,     lineDevis:     a('devis')?LINE:TR,
      bgProduits:  a('produits')?ACT:TR,  lineProduits:  a('produits')?LINE:TR,
      bgDocs:      a('docs')?ACT:TR,      lineDocs:      a('docs')?LINE:TR,
      bgAcademy:   a('academy')?ACT:TR,   lineAcademy:   a('academy')?LINE:TR,
      bgCompte:    a('compte')?ACT:TR,    lineCompte:    a('compte')?LINE:TR,
      goAffaires:  nav('affaires'),
      goProspects: nav('prospects'),
      goContacts:  nav('contacts'),
      goProduits:  nav('produits'),
      goActivites: nav('activites'),
      goDevis:     nav('devis'),
      goDocs:      nav('docs'),
      goStats:     nav('stats'),
      goConfig:    nav('config'),
      goAcademy:   nav('academy'),
      goCompte:    nav('compte'),
    };
  }
}
</script>
